# Usage Example
services:
  nginx:
    image: ichikawayukko/nginx_letsencrypt:1.30.0
    build:
      context: 1.30.0/
    environment:
      - HEALTHCHECK_URL=https://example.com
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./volume/htdocs/:/var/www/html/:z
      - ./volume/certs/:/etc/letsencrypt/:z
    ports:
      - "80:80"
      - "443:443"
    restart: always
